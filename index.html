<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hetrax Pubg Key Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        .rounded { border-radius: 30px !important; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }
        body { background-color: #050505; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; position: relative; }
        .bg-glow { position: fixed; width: 700px; height: 700px; background: radial-gradient(circle, rgba(138,43,226,0.15) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%,-50%); z-index: -1; animation: pulseGlow 4s infinite alternate; }
        @keyframes pulseGlow { 0% { transform: translate(-50%,-50%) scale(1); opacity: 0.5; } 100% { transform: translate(-50%,-50%) scale(1.2); opacity: 1; } }

        .container { width: 100%; max-width: 480px; padding: 20px; z-index: 1; transition: max-width 0.4s ease; }
        .premium-card { background: rgba(15,15,20,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(138,43,226,0.35); border-radius: 20px; padding: 45px; box-shadow: 0 0 40px rgba(138,43,226,0.12), inset 0 0 20px rgba(138,43,226,0.05); }

        .logo-text { font-size: 40px; font-weight: 800; text-align: center; letter-spacing: 5px; background: linear-gradient(90deg, #8a2be2, #d100ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .logo-text.small { font-size: 24px; }
        .sub-text { text-align: center; font-size: 10px; letter-spacing: 3px; color: #555; margin-bottom: 35px; font-weight: 600; text-transform: uppercase; }

        .input-group { position: relative; margin-bottom: 35px; }
        .input-group input { width: 100%; padding: 12px 0; font-size: 16px; color: #fff; border: none; border-bottom: 1px solid #333; outline: none; background: transparent; transition: 0.3s; }
        .input-group label { position: absolute; top: 12px; left: 0; font-size: 16px; color: #555; pointer-events: none; transition: 0.3s; }
        .input-group input:focus ~ label,
        .input-group input:valid ~ label { top: -16px; font-size: 11px; color: #8a2be2; letter-spacing: 1px; text-transform: uppercase; }
        .input-line { position: absolute; bottom: 0; left: 0; width: 0; height: 2px; background: linear-gradient(90deg, #8a2be2, #d100ff); transition: width 0.3s ease; }
        .input-group input:focus ~ .input-line { width: 100%; }

        .neon-btn { display: block; width: 100%; padding: 16px 30px; color: #c060ff; font-size: 15px; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; background: rgba(138,43,226,0.08); border: 2px solid #8a2be2; cursor: pointer; transition: all 0.35s ease; box-shadow: 0 0 12px rgba(138,43,226,0.2); margin-top: 25px; }
        .neon-btn:hover:not(:disabled) { background: #8a2be2; color: #fff; box-shadow: 0 0 20px #8a2be2, 0 0 50px rgba(138,43,226,0.4); transform: translateY(-1px); }
        .neon-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .msg { text-align: center; margin-top: 18px; font-size: 13px; min-height: 22px; font-weight: 600; transition: color 0.3s; }

        /* PANEL */
        .panel-card { background: rgba(15,15,20,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(138,43,226,0.35); border-radius: 20px; padding: 35px; box-shadow: 0 0 40px rgba(138,43,226,0.12); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; padding-bottom: 18px; border-bottom: 1px solid rgba(138,43,226,0.2); }
        .logout-btn { background: transparent; color: #ff3366; border: 1px solid #ff3366; padding: 9px 18px; cursor: pointer; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s; border-radius: 20px; }
        .logout-btn:hover { background: #ff3366; color: #fff; box-shadow: 0 0 15px rgba(255,51,102,0.5); }

        .control-row { display: flex; gap: 15px; align-items: stretch; margin-bottom: 10px; flex-wrap: wrap; }
        .styled-select { flex: 1; min-width: 160px; padding: 13px 14px; font-size: 15px; color: #fff; border: 2px solid rgba(138,43,226,0.4); outline: none; background: rgba(138,43,226,0.08); border-radius: 12px; cursor: pointer; appearance: none; -webkit-appearance: none; font-family: "Poppins", sans-serif; font-weight: 600; transition: 0.3s; }
        .styled-select:focus { border-color: #8a2be2; box-shadow: 0 0 10px rgba(138,43,226,0.3); }
        .styled-select option { background: #0f0f14; color: #fff; }
        .btn-generate { flex: 2; min-width: 180px; margin-top: 0; padding: 13px 20px; font-size: 13px; }
        .btn-clearall { flex: 1; min-width: 140px; margin-top: 0; padding: 13px 15px; font-size: 12px; border-color: #ff3366; color: #ff3366; box-shadow: 0 0 10px rgba(255,51,102,0.15); }
        .btn-clearall:hover:not(:disabled) { background: #ff3366; color: #fff; box-shadow: 0 0 20px rgba(255,51,102,0.5); }

        .table-wrapper { margin-top: 25px; border-radius: 12px; border: 1px solid rgba(138,43,226,0.2); overflow: auto; max-height: 420px; }
        table { width: 100%; border-collapse: collapse; min-width: 750px; }
        th, td { padding: 14px 16px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 13px; white-space: nowrap; }
        th { background: rgba(138,43,226,0.12); color: #c060ff; font-weight: 700; letter-spacing: 1px; font-size: 12px; text-transform: uppercase; position: sticky; top: 0; }
        tr:hover td { background: rgba(138,43,226,0.06); }
        .key-text { font-family: "Courier New", monospace; font-size: 14px; color: #e0e0ff; letter-spacing: 1px; }
        .date-text { color: #888; }
        .s-active   { color: #00ffcc; font-weight: 700; }
        .s-infinite { color: #d100ff; font-weight: 800; text-shadow: 0 0 8px rgba(209,0,255,0.6); }
        .s-expired  { color: #ff3366; font-weight: 700; }
        .s-inactive { color: #ff6666; font-weight: 700; }
        .ab { padding: 5px 11px; border-radius: 6px; border: 1px solid; cursor: pointer; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; margin-right: 4px; transition: all 0.25s; background: transparent; font-family: "Poppins", sans-serif; text-transform: uppercase; }
        .ab:hover { transform: scale(1.06); }
        .ab-ban    { color: #ffcc00; border-color: #ffcc00; } .ab-ban:hover { background: #ffcc00; color: #000; }
        .ab-unban  { color: #00ffcc; border-color: #00ffcc; } .ab-unban:hover { background: #00ffcc; color: #000; }
        .ab-hwid   { color: #44aaff; border-color: #44aaff; } .ab-hwid:hover { background: #44aaff; color: #000; }
        .ab-del    { color: #ff3366; border-color: #ff3366; } .ab-del:hover { background: #ff3366; color: #fff; }
    </style>
</head>
<body>
<div class="bg-glow"></div>
<div class="container" id="mainContainer">

    <!-- LOGIN -->
    <div id="authSection" class="premium-card">
        <div class="logo-text">HETRAX</div>
        <div class="sub-text">Premium Cheat Services</div>
        <div class="input-group">
            <input type="text" id="uname" required>
            <label>Username</label>
            <div class="input-line"></div>
        </div>
        <div class="input-group">
            <input type="password" id="upass" required>
            <label>Password</label>
            <div class="input-line"></div>
        </div>
        <button class="neon-btn rounded" id="loginBtn">ENTER SYSTEM</button>
        <p class="msg" id="authMsg"></p>
    </div>

    <!-- PANEL -->
    <div id="panelSection" style="display:none; width:1050px; max-width:100%;">
        <div class="panel-card">
            <div class="panel-header">
                <div class="logo-text small">HETRAX CONTROL</div>
                <button class="logout-btn" id="logoutBtn">&#x2192; Logout</button>
            </div>
            <div class="control-row">
                <select id="duration" class="styled-select">
                    <option value="1">1 Day</option>
                    <option value="7">7 Days</option>
                    <option value="30" selected>30 Days</option>
                    <option value="365">1 Year</option>
                    <option value="infinite">&#x221e; Infinite (Lifetime)</option>
                </select>
                <button class="neon-btn btn-generate rounded" id="genBtn">&#x2B; Generate License</button>
                <button class="neon-btn btn-clearall rounded" id="clearBtn">&#x1F5D1; Clear All</button>
            </div>
            <p class="msg" id="panelMsg"></p>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>License Key</th>
                            <th>Created</th>
                            <th>Expires</th>
                            <th>Status</th>
                            <th>HWID</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="keysTbody"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>
<script>
(function() {
    var DB = "https://jsonblob.com/api/jsonBlob/019ed74c-ec82-7373-8612-cdd702f397df";

    function msg(id, text, err) {
        var el = document.getElementById(id);
        el.textContent = text;
        el.style.color = err ? "#ff3366" : "#00ffcc";
        setTimeout(function() { el.textContent = ""; }, 3500);
    }

    function getAuth() { return localStorage.getItem("hx_auth") === "1"; }

    function showPanel(v) {
        var a = document.getElementById("authSection");
        var p = document.getElementById("panelSection");
        var c = document.getElementById("mainContainer");
        if (v) {
            a.style.display = "none";
            p.style.display = "block";
            c.style.maxWidth = "1100px";
            loadKeys();
        } else {
            a.style.display = "block";
            p.style.display = "none";
            c.style.maxWidth = "480px";
        }
    }

    function fetchKeys(cb) {
        fetch(DB)
            .then(function(r) { return r.json(); })
            .then(function(d) { cb(Array.isArray(d) ? d : []); })
            .catch(function() { cb([]); });
    }

    function saveKeys(arr, cb) {
        fetch(DB, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(arr)
        }).then(function() { if (cb) cb(); }).catch(function() { if (cb) cb(); });
    }

    function loadKeys() {
        fetchKeys(function(keys) { renderTable(keys); });
    }

    function renderTable(keys) {
        var tbody = document.getElementById("keysTbody");
        tbody.innerHTML = "";
        var list = keys.slice().reverse();
        list.forEach(function(k, i) {
            var real_i = keys.length - 1 - i;
            var sText, sCls, exp;
            if (k.isInfinite) {
                sText = "INFINITE"; sCls = "s-infinite"; exp = "NEVER";
            } else if (!k.expiresAt || new Date() > new Date(k.expiresAt)) {
                sText = "EXPIRED"; sCls = "s-expired"; exp = k.expiresAt ? new Date(k.expiresAt).toLocaleDateString() : "-";
            } else {
                sText = "ACTIVE"; sCls = "s-active"; exp = new Date(k.expiresAt).toLocaleDateString();
            }
            if (!k.isActive && sCls !== "s-expired") { sText = "INACTIVE"; sCls = "s-inactive"; }

            var hwid = k.hwid ? k.hwid.substring(0,10) + "..." : "Not Bound";
            var banLabel = k.isActive ? "Ban" : "Unban";
            var banCls   = k.isActive ? "ab-ban" : "ab-unban";

            var tr = document.createElement("tr");
            tr.innerHTML =
                "<td><span class='key-text'>" + k.key + "</span></td>" +
                "<td class='date-text'>" + new Date(k.createdAt).toLocaleDateString() + "</td>" +
                "<td class='date-text'>" + exp + "</td>" +
                "<td class='" + sCls + "'>" + sText + "</td>" +
                "<td class='date-text'>" + hwid + "</td>" +
                "<td>" +
                  "<button class='ab " + banCls + "' data-idx='" + real_i + "' data-action='ban'>" + banLabel + "</button>" +
                  "<button class='ab ab-hwid' data-idx='" + real_i + "' data-action='hwid'>Reset HWID</button>" +
                  "<button class='ab ab-del' data-idx='" + real_i + "' data-action='del'>Delete</button>" +
                "</td>";
            tbody.appendChild(tr);
        });

        document.getElementById("keysTbody").addEventListener("click", function(e) {
            var btn = e.target.closest("button[data-action]");
            if (!btn) return;
            var action = btn.getAttribute("data-action");
            var idx = parseInt(btn.getAttribute("data-idx"));
            fetchKeys(function(keys2) {
                if (action === "ban") {
                    keys2[idx].isActive = !keys2[idx].isActive;
                    saveKeys(keys2, function() { renderTable(keys2); msg("panelMsg", keys2[idx].isActive ? "Key Unbanned!" : "Key Banned!"); });
                } else if (action === "hwid") {
                    keys2[idx].hwid = null;
                    saveKeys(keys2, function() { renderTable(keys2); msg("panelMsg", "HWID Reset!"); });
                } else if (action === "del") {
                    if (!confirm("Delete this key?")) return;
                    keys2.splice(idx, 1);
                    saveKeys(keys2, function() { renderTable(keys2); msg("panelMsg", "Key Deleted!"); });
                }
            });
        }, { once: true });
    }

    // LOGIN
    document.getElementById("loginBtn").addEventListener("click", function() {
        var u = document.getElementById("uname").value;
        var p = document.getElementById("upass").value;
        if (u === "Hetrax" && p === "Hetrax123") {
            localStorage.setItem("hx_auth", "1");
            msg("authMsg", "Access Granted!", false);
            setTimeout(function() { showPanel(true); }, 400);
        } else {
            msg("authMsg", "Invalid Credentials!", true);
        }
    });

    // ENTER on input fields
    document.getElementById("upass").addEventListener("keydown", function(e) {
        if (e.key === "Enter") document.getElementById("loginBtn").click();
    });
    document.getElementById("uname").addEventListener("keydown", function(e) {
        if (e.key === "Enter") document.getElementById("loginBtn").click();
    });

    // LOGOUT
    document.getElementById("logoutBtn").addEventListener("click", function() {
        localStorage.removeItem("hx_auth");
        showPanel(false);
    });

    // GENERATE
    document.getElementById("genBtn").addEventListener("click", function() {
        var btn = this;
        btn.disabled = true;
        btn.textContent = "Generating...";
        var dur = document.getElementById("duration").value;
        var ch = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        var rnd = function() { return Array.from({length:4}, function() { return ch[Math.floor(Math.random()*ch.length)]; }).join(""); };
        var key = "HTRX-" + rnd() + "-" + rnd() + "-" + rnd();
        var exp = dur === "infinite" ? null : new Date(Date.now() + parseInt(dur)*86400000).toISOString();
        var entry = { key: key, createdAt: new Date().toISOString(), expiresAt: exp, isActive: true, isInfinite: dur === "infinite", hwid: null };
        fetchKeys(function(keys) {
            keys.push(entry);
            saveKeys(keys, function() {
                renderTable(keys);
                msg("panelMsg", "License Generated: " + key);
                btn.disabled = false;
                btn.innerHTML = "&#x2B; Generate License";
            });
        });
    });

    // CLEAR ALL
    document.getElementById("clearBtn").addEventListener("click", function() {
        if (!confirm("Delete ALL keys? This cannot be undone!")) return;
        saveKeys([], function() {
            renderTable([]);
            msg("panelMsg", "All keys cleared!", true);
        });
    });

    // Init
    showPanel(getAuth());
})();
</script>
</body>
</html>
